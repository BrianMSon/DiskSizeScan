name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # required to publish releases on tag pushes

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: DiskSizeScan-windows-amd64
          - os: ubuntu-22.04
            platform: linux/amd64
            name: DiskSizeScan-linux-amd64
          - os: macos-latest
            platform: darwin/universal
            name: DiskSizeScan-macos-universal
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev xvfb dbus dbus-x11

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build (wails)
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Smoke test (Linux, headless)
        if: runner.os == 'Linux'
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
          WEBKIT_DISABLE_DMABUF_RENDERER: '1'
        run: |
          echo "::group::Shared library check (ldd)"
          if ldd build/bin/DiskSizeScan | grep -i "not found"; then
            echo "::error::Binary is missing shared libraries"; exit 1
          fi
          echo "all libraries resolved"
          echo "::endgroup::"
          echo "Launching the app headlessly for 12s to confirm it starts..."
          xvfb-run -a dbus-run-session -- bash -c '
            ./build/bin/DiskSizeScan &
            APP=$!
            sleep 12
            if kill -0 "$APP" 2>/dev/null; then
              echo "App still running after 12s - launch OK"
              kill "$APP" 2>/dev/null || true
              exit 0
            else
              wait "$APP"; CODE=$?
              echo "App exited prematurely (code $CODE) - startup failed"
              exit 1
            fi
          '

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: build/bin/*
          if-no-files-found: error

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Zip each platform build
        run: |
          cd dist
          for d in */; do
            name="${d%/}"
            (cd "$d" && zip -r "../${name}.zip" .)
          done
          ls -la

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
